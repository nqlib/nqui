name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint source and scripts
        run: pnpm exec eslint src scripts --max-warnings 0

      - name: Typecheck library
        run: pnpm exec tsc -p tsconfig.lib.json --noEmit

      # Build BEFORE test so the dist-artifact guards (peer isolation, no
      # inlined react-router/shiki/sandpack) run against real output instead
      # of skipping on a fresh checkout.
      - name: Build library
        run: pnpm run build:lib

      - name: Test
        run: pnpm test

      - name: Bundle-size budget
        run: pnpm run size
